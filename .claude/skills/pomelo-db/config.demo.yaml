# pomelo-db demo configuration
# Copy to config.yaml and modify with your actual credentials
# See skill README for DSN format and supported database types

log:
  level: warn  # debug, info, warn, error

query:
  # allowed_operators controls which SQL statements are permitted.
  # If not set (or empty), all statements are allowed (unrestricted).
  # Uncomment to restrict to read-only operations:
  # allowed_operators:
  #   - SELECT
  #   - SHOW
  #   - DESCRIBE
  #   - EXPLAIN
  #   - PRAGMA
  #   - DESC
  datasources:
    # <db-type>://<user>:<password>@<host>:<port>/<database>[?key=value&...]
    # DSN format and supported databases: see README.md
